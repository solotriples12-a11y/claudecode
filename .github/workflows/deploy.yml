name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos mínimos para que la acción de Pages publique el build.
permissions:
  contents: read
  pages: write
  id-token: write

# Evitar despliegues en paralelo; si llega otro push, se encola sin cancelar
# el que ya está desplegando para no dejar la web a medias.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build con Astro
        uses: withastro/action@v3
        with:
          node-version: 20
          package-manager: npm

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en Pages
        id: deployment
        uses: actions/deploy-pages@v4
